trigger:
  - master

parameters:
  - name: versionIncrement
    type: string
    default: 'patch'
  - name: gitFlowType
    displayName: Git flow strategy
    type: string
    default: github-flow
    values:
      - github-flow
      - gitflow
      - trunk-based
      - gitlab-flow
  - name: developIncrement
    displayName: Version increment for develop branch (gitflow)
    type: string
    default: patch
  - name: releaseIncrement
    displayName: Version increment for release branches (gitflow)
    type: string
    default: minor
  - name: hotfixIncrement
    displayName: Version increment for hotfix branches (gitflow)
    type: string
    default: patch
  - name: sonarKey
    type: string
    default: ''

stages:
  - stage: Initialization
    displayName: 'Initialization and versioning'
    jobs:
      - template: /azure-pipelines/jobs/flutter/flutter_version_increment.yml
        parameters:
          versionIncrement: ${{ parameters.versionIncrement }}
          gitFlowType: ${{ parameters.gitFlowType }}
          developIncrement: ${{ parameters.developIncrement }}
          releaseIncrement: ${{ parameters.releaseIncrement }}
          hotfixIncrement: ${{ parameters.hotfixIncrement }}

  - stage: DeployDev
    displayName: 'Deploy to Firebase Dev'
    dependsOn: Initialization
    condition: and(succeeded(), eq(dependencies.Initialization.outputs['Versioning.gitflow.shouldDeploy'], 'true'))
    jobs:
      - template: /azure-pipelines/jobs/flutter/flutter_build_firebase_deploy.yml
        parameters:
          sonarKey: ${{parameters.sonarKey}}
          environment: 'dev'
          firebaseToken: $(FIREBASE_TOKEN_DEV)

  - stage: DeployProd
    displayName: 'Deploy to Firebase Prod'
    dependsOn: DeployDev
    condition: and(succeeded(), eq(dependencies.Initialization.outputs['Versioning.gitflow.deployEnvironment'], 'production'))
    jobs:
      - template: /azure-pipelines/jobs/flutter/flutter_build_firebase_deploy.yml
        parameters:
          sonarKey: ${{parameters.sonarKey}}
          environment: 'prod'
          firebaseToken: $(FIREBASE_TOKEN_PROD)