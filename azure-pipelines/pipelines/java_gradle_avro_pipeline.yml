trigger:
  - master

parameters:
  - name: appName
    displayName: Application name
    type: string
    default: $(Build.Repository.Name)
  - name: jsonFile
    type: string
    default: cicd.json
  - name: versionIncrement
    type: string
    default: 'patch'
  - name: gradlePath
    type: string
  - name: javaVersion
    type: string

stages:
  - stage: Initialization
    jobs:
      - template: /jobs/json_semantic_version.yml
        parameters:
          versionIncrement: ${{ parameters.versionIncrement }}
          jsonFile: ${{ parameters.jsonFile }}
  - stage: Build
    dependsOn: Initialization
    variables:
      version: $[stageDependencies.Initialization.Versioning.outputs['version.DockerTag']]
    jobs:
      - template: /jobs/java/java_gradle_avro_build.yml
        parameters:
          javaVersion: ${{ parameters.javaVersion }}
          projectVersion: $(version)
          jsonFile: ${{ parameters.jsonFile }}
  - stage: Publish_Artifact
    dependsOn: 
      - Initialization
      - Build
    variables:
      version: $[stageDependencies.Initialization.Versioning.outputs['version.DockerTag']]
    jobs:
      - template: /jobs/java/gradle_package_publish.yml
        parameters:
          javaVersion: ${{ parameters.javaVersion }}
          projectVersion: $(version)
          jsonFile: ${{ parameters.jsonFile }}

  - stage: Finalization
    condition: ne(variables['Build.Reason'], 'PullRequest')
    dependsOn: 
      - Initialization
      - Build
    variables:
      version: $[stageDependencies.Initialization.Versioning.outputs['version.DockerTag']]
    jobs:
      - template: /jobs/finalisation.yml
        parameters:
          releaseVersion: $(version)
          jsonFile: ${{ parameters.jsonFile }}
          language: 'java'