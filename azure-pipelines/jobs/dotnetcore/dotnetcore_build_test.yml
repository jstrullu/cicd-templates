parameters:
  - name: sonarProjectKey
    type: string
  - name: projectFile
    type: string
  - name: projectVersion
    type: string

jobs:
  - job: BuildAndTest
    steps:
      - task: PowerShell@2
        displayName: 'Assembly Version Generation'
        inputs:
          targetType: 'inline'
          script: |
            $ProjectFile = '${{ parameters.projectFile }}'
            # get a new line with <AssemblyVersion> tag and new version number
            $NewAssemblyVersionLine = '$(assemblyLine)' -replace '$(currentVersion)', '${{ parameters.projectVersion }}'
            # replace the old line with the <AssemblyVersion> tag with a new one
            (Get-Content $ProjectFile) | Foreach-Object {$_ -replace '$(assemblyLine)', $NewAssemblyVersionLine} | Set-Content $ProjectFile
      
      - task: SonarQubePrepare@5
        displayName: 'Prepare Sonar'
        continueOnError: true
        inputs:
          SonarQube: 'Sonar'
          scannerMode: 'MSBuild'
          projectKey: ${{ parameters.sonarProjectKey }}
          projectName: $(Build.Repository.Name)
          projectVersion: ${{ parameters.projectVersion }}
          extraProperties: |
            sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
      - task: DotNetCoreCLI@2
        displayName: 'Restore'
        inputs:
          command: restore
          projects: '**/*.csproj'
          nocache: true
      - task: DotNetCoreCLI@2
        displayName: 'Build'
        inputs:
          projects: '**/*.csproj'
          arguments: '--no-restore -c Release'
      - task: DotNetCoreCLI@2
        displayName: 'Unit tests'
        inputs:
          command: 'test'
          projects: |
            **/*Tests.*.csproj
          arguments: '--no-build -c Release --logger trx;LogFileName=TEST.xml /p:CollectCoverage=true /p:CoverletOutputFormat=opencover'
          publishTestResults: false
      - task: DotNetCoreCLI@2
        inputs:
          command: test
          projects: '**/*Tests.*.csproj'
          arguments: '--configuration $(buildConfiguration) --collect "Code coverage"'
      - script: |
          files=$(find $(pwd)/ -name coverage.opencover.xml -type f -print0 | tr '\0' ';')
          echo $files
          echo "##vso[task.setvariable variable=coverageFiles;]$files"
        displayName: 'Get coverage files path'
      - task: PublishTestResults@2
        displayName: 'Publish Test Results'
        inputs:
          testResultsFormat: 'VSTest'
          testResultsFiles: '**/TEST*.xml'
          testRunTitle: 'Unit Tests'
          mergeTestResults: true
          condition: succeededOrFailed()
      - task: SonarQubeAnalyze@5
        displayName: 'Analyse sonar'
        continueOnError: true
      - task: SonarQubePublish@5
        displayName: 'Publish sonar'
        continueOnError: true
        inputs:
          pollingTimeoutSec: '300'
      - task: reportgenerator@5
        displayName: 'Report Generator'
        continueOnError: true
        inputs:
          reports: '$(coverageFiles)'
          targetdir: './coveragereport'
          verbosity: Error
      - task: PublishCodeCoverageResults@1
        displayName: 'Publish code coverage'
        inputs:
          codeCoverageTool: Cobertura
          summaryFileLocation: './coveragereport/Cobertura.xml'
          reportDirectory: './coveragereport'