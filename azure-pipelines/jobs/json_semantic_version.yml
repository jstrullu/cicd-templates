# Takes the versionIncrement variable and the JSON file to update as parameters
# This job handles version bumping, git tagging, and pipeline naming in Azure DevOps
# Additionally, the semantic version branch-major.minor.patch is persisted in the DockerTag variable for subsequent stages
#
# Git flow context outputs (from the gitflow step):
#   Versioning.gitflow.shouldDeploy      — "true" if this branch should trigger deployment
#   Versioning.gitflow.deployEnvironment — target environment: dev, staging, or production
#   Versioning.gitflow.shouldTag         — "true" if a git tag should be created
#   Versioning.gitflow.shouldFinalize    — "true" if version commit + push should happen
#   Versioning.gitflow.versionSuffix     — suffix for pre-releases (e.g. -SNAPSHOT, -rc)
#   Versioning.gitflow.versionIncrement  — resolved bump level, or "none" to skip bumping
parameters:
  - name: versionIncrement
    type: string
    default: patch
  - name: jsonFile
    type: string
  - name: gitFlowType
    type: string
    default: github-flow
    values:
      - github-flow
      - gitflow
      - trunk-based
      - gitlab-flow
  - name: developIncrement
    type: string
    default: patch
  - name: releaseIncrement
    type: string
    default: minor
  - name: hotfixIncrement
    type: string
    default: patch

jobs:
  - job: Versioning
    steps:
    - checkout: self
      clean: true
      persistCredentials: true
    - template: ..\steps\resolve_gitflow_context.yml
      parameters:
        gitFlowType: ${{ parameters.gitFlowType }}
        defaultIncrement: ${{ parameters.versionIncrement }}
        developIncrement: ${{ parameters.developIncrement }}
        releaseIncrement: ${{ parameters.releaseIncrement }}
        hotfixIncrement: ${{ parameters.hotfixIncrement }}
    - template: ..\steps\set_version_increment.yml
      parameters:
        versionIncrement: ${{ parameters.versionIncrement }}
    # Apply git flow branch-specific increment when PR title did not override
    - bash: |
        echo "Applying git flow increment: $(gitflow.versionIncrement)"
        echo "##vso[task.setvariable variable=versionIncrement;]$(gitflow.versionIncrement)"
      displayName: 'Apply git flow version increment'
      condition: and(succeeded(), ne(variables['gitflow.versionIncrement'], 'none'), ne(variables['gitflow.versionIncrement'], ''), eq(variables['versionIncrementFromPR'], ''))
    - task: shellexec@0
      displayName: Create file ${{ parameters.jsonFile }} if it does not exist
      inputs:
        code: |
          test -f "$(Build.SourcesDirectory)/${{ parameters.jsonFile }}" || echo "{\"version\": \"0.0.0\"}" > "$(Build.SourcesDirectory)/${{ parameters.jsonFile }}"
          git add ${{ parameters.jsonFile }}
    - task: LoadJsonVariables@2
      displayName: Load current version
      inputs:
        JsonSource: ${{ parameters.jsonFile }}
        VariablePrefix: cicd
        MarkAsSecret: false    
    - task: Npm@1
      displayName: Install semver
      inputs:
        command: 'custom'
        customCommand: 'install semver -g'
    - task: CmdLine@1
      displayName: Bump version
      inputs:
        filename: sh
        arguments: -c "echo \"##vso[task.setvariable variable=releaseVersion;]`semver $(cicd_version) -i $(versionIncrement)`\"
      condition: and(succeeded(), ne(variables['gitflow.versionIncrement'], 'none'))
    - bash: |
        echo "No version bump — using existing version: $(cicd_version)"
        echo "##vso[task.setvariable variable=releaseVersion;]$(cicd_version)"
      displayName: 'Use existing version (no bump)'
      condition: and(succeeded(), eq(variables['gitflow.versionIncrement'], 'none'))
    - bash: |
        VERSION="$(releaseVersion)"
        SUFFIX="$(gitflow.versionSuffix)"
        if [ -n "$SUFFIX" ]; then
          FULL_VERSION="${VERSION}${SUFFIX}"
        else
          FULL_VERSION="${VERSION}"
        fi
        echo "##vso[task.setvariable variable=DockerTag;isOutput=true]$(echo "$FULL_VERSION" | tr '[:upper:]' '[:lower:]')"
      name: version
      displayName: 'Record artifact version'
    
    - task: CmdLine@1
      displayName: Update pipeline name
      inputs:
        filename: sh
        arguments: '-c echo "##vso[build.updatebuildnumber]$(Build.Repository.Name) $(Build.SourceBranchName)-$(releaseVersion)"'
      condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    - task: CmdLine@1
      displayName: Update PR pipeline name
      inputs:
        filename: sh
        arguments: '-c echo "##vso[build.updatebuildnumber]$(Build.Repository.Name) PR $(System.PullRequest.PullRequestId).$(System.PullRequest.PullRequestIteration)"'
      condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))

    - task: CmdLine@1
      displayName: Save version
      inputs:
        filename: sh
        arguments: -c "echo \"##vso[task.setvariable variable=Version;isOutput=true]$(releaseVersion)\"
      name: semantic