parameters:
  - name: javaVersion
    type: string
  - name: projectVersion
    type: string
  - name: jsonFile
    type: string


jobs:
  - job: Build_Test
    timeoutInMinutes: 30
    steps:
    - checkout: self
      clean: true
      persistCredentials: true
    - template: ..\..\steps\set_version_file.yml
      parameters:
        jsonFile: ${{parameters.jsonFile}}
        releaseVersion: ${{parameters.projectVersion}}
    - task: JavaToolInstaller@0
      inputs:
        versionSpec: ${{ parameters.javaVersion }}
        jdkArchitectureOption: 'x64'
        jdkSourceOption: 'PreInstalled'
    - task: Cache@2
      displayName: 'Cache Gradle packages'
      inputs:
        key: 'gradle | "$(Agent.OS)" | **/build.gradle*'
        restoreKeys: 'gradle | "$(Agent.OS)"'
        path: '$(GRADLE_USER_HOME)/caches'
    - task: Gradle@3
      inputs:
        gradleWrapperFile: 'gradlew'
        tasks: 'build'
        publishJUnitResults: false
        javaHomeOption: 'JDKVersion'
    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: '$(Build.SourcesDirectory)'
        artifact: 'drop'
        publishLocation: 'pipeline'