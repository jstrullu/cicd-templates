parameters:
  - name: projectVersion
    type: string

jobs:
  - job: Linter
    steps:
      - checkout: self
        clean: true
        persistCredentials: true
      
      - task: NodeTool@0
        inputs:
          versionSpec: '18.x'
        displayName: 'Install Node.js'
      
      - script: |
          npm ci
        displayName: 'Install dependencies'

      - script: |
          npm version ${{ parameters.projectVersion }} --no-git-tag-version
        displayName: 'Update version number'

      - script: |
          npm run lint
        displayName: 'Run linter'