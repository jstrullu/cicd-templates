parameters:
  - name: sonarKey
    type: string
    default: ''
  - name: projectVersion
    type: string
  - name: jsonFile
    type: string


jobs:
  - job: Build_Test
    steps:
      - checkout: self
        clean: true
        persistCredentials: true
      
      - task: NodeTool@0
        inputs:
          versionSpec: '20.x'
        displayName: 'Install Node.js'
        
      - ${{ if ne(parameters.sonarKey, '') }}:
        - task: SonarQubePrepare@5
          displayName: 'Prepare Sonar'
          inputs:
            SonarQube: 'Sonar'
            scannerMode: 'CLI'
            configMode: 'manual'
            cliProjectKey: ${{ parameters.sonarKey }}
            cliSources: 'src'
            extraProperties: |
              sonar.projectVersion=${{ parameters.projectVersion }}

      - script: |
          npm install -g @angular/cli
          npm install
        displayName: 'npm install'

      - script: |
          npm version ${{ parameters.projectVersion }} --no-git-tag-version
        displayName: 'Update version number'

      - script: |
          npm run generate:openapi
        displayName: Open Api Generation

      - script: |
          npm run build
        displayName: Build

      - ${{ if ne(parameters.sonarKey, '') }}:
        - task: SonarQubeAnalyze@5
          displayName: 'Sonar analysis'
        - task: SonarQubePublish@5
          displayName: 'Publish sonar'
          inputs:
            pollingTimeoutSec: '300'

      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: '$(Build.SourcesDirectory)'
          artifact: 'drop'
          publishLocation: 'pipeline'