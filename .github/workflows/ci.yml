name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Preprocess and lint YAML files
        run: |
          exit_code=0
          for file in $(find azure-pipelines -name '*.yml'); do
            # Replace Azure Pipelines template expressions with placeholders
            # so yamllint can parse the file without false-positive errors.
            sed \
              -e 's/\${{[^}]*}}/PLACEHOLDER/g' \
              -e 's/\$\[[^]]*\]/PLACEHOLDER/g' \
              "$file" > /tmp/lint_target.yml

            if ! yamllint -c .yamllint.yml /tmp/lint_target.yml; then
              echo "::error file=$file::yamllint failed"
              exit_code=1
            fi
          done
          exit $exit_code

  validate-templates:
    name: Validate template conventions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run template validation
        run: python scripts/validate_templates.py

  changelog-check:
    name: Changelog updated
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md was modified
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^CHANGELOG.md$'; then
            echo "CHANGELOG.md has been updated."
          else
            echo "::warning::CHANGELOG.md was not updated in this PR. Please document your changes."
          fi
