name: Update Changelog

on:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  update-changelog:
    name: Auto-update CHANGELOG.md
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate changelog from commits
        run: python scripts/generate_changelog.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated changelog via API
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api "repos/${{ github.repository }}/contents/CHANGELOG.md?ref=master" --jq '.sha')
          CONTENT=$(base64 -w 0 CHANGELOG.md)
          gh api "repos/${{ github.repository }}/contents/CHANGELOG.md" \
            --method PUT \
            --field message="docs: auto-update CHANGELOG.md [skip ci]" \
            --field content="$CONTENT" \
            --field sha="$SHA" \
            --field branch="master"
