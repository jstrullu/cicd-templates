name: Release

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'

permissions:
  contents: write

concurrency:
  group: changelog-update

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Freeze changelog and extract release notes
        id: changelog
        run: |
          python scripts/freeze_changelog.py "${{ github.ref_name }}"
          echo "has-notes=true" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Commit frozen changelog via API
        if: steps.changelog.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "No changelog changes to commit."
            exit 0
          fi

          # Get the current SHA of CHANGELOG.md on master
          SHA=$(gh api "repos/${{ github.repository }}/contents/CHANGELOG.md?ref=master" --jq '.sha')

          # Commit the frozen changelog via the Contents API
          # Requires PAT_TOKEN secret with repo scope to bypass branch protection
          CONTENT=$(base64 -w 0 CHANGELOG.md)
          gh api "repos/${{ github.repository }}/contents/CHANGELOG.md" \
            --method PUT \
            --field message="docs: freeze changelog for ${{ github.ref_name }} [skip ci]" \
            --field content="$CONTENT" \
            --field sha="$SHA" \
            --field branch="master"
        continue-on-error: true

      - name: Prepare release notes fallback
        if: steps.changelog.outcome != 'success'
        run: |
          echo "Release ${{ github.ref_name }}" > /tmp/release_notes.md

      - name: Extract version number
        id: version
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release_notes.md
