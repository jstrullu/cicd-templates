name: Release

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Freeze changelog and extract release notes
        id: changelog
        run: |
          python scripts/freeze_changelog.py "${{ github.ref_name }}"
          echo "has-notes=true" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Commit frozen changelog to master
        if: steps.changelog.outcome == 'success'
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "No changelog changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git checkout master
          git stash pop
          git add CHANGELOG.md
          git commit -m "docs: freeze changelog for ${{ github.ref_name }} [skip ci]"
          git push origin master
        continue-on-error: true

      - name: Prepare release notes fallback
        if: steps.changelog.outcome != 'success'
        run: |
          echo "Release ${{ github.ref_name }}" > /tmp/release_notes.md

      - name: Extract version number
        id: version
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release_notes.md
