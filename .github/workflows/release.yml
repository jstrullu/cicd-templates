name: Release

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'
  # Fallback manuel : un tag posé sur un commit « [skip ci] » ne déclenche pas
  # l'event push. Permet de (re)lancer la release à la main pour ce tag.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag à releaser (ex. 1.0.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: changelog-update

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Sur push tag : github.ref_name = le tag. Sur workflow_dispatch : l'input.
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Sur dispatch, checkout le commit du tag (sinon HEAD de la branche).
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Freeze changelog and extract release notes
        id: changelog
        run: |
          python scripts/freeze_changelog.py "${{ env.TAG }}"
          echo "has-notes=true" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Commit frozen changelog via API
        if: steps.changelog.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "No changelog changes to commit."
            exit 0
          fi

          # Get the current SHA of CHANGELOG.md on master
          SHA=$(gh api "repos/${{ github.repository }}/contents/CHANGELOG.md?ref=master" --jq '.sha')

          # Commit the frozen changelog via the Contents API
          # Requires PAT_TOKEN secret with repo scope to bypass branch protection
          CONTENT=$(base64 -w 0 CHANGELOG.md)
          gh api "repos/${{ github.repository }}/contents/CHANGELOG.md" \
            --method PUT \
            --field message="docs: freeze changelog for ${{ env.TAG }} [skip ci]" \
            --field content="$CONTENT" \
            --field sha="$SHA" \
            --field branch="master"
        continue-on-error: true

      - name: Prepare release notes fallback
        if: steps.changelog.outcome != 'success'
        run: |
          echo "Release ${{ env.TAG }}" > /tmp/release_notes.md

      - name: Extract version number
        id: version
        run: |
          VERSION=$(echo "${{ env.TAG }}" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.TAG }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release_notes.md
