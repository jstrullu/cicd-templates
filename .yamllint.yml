---
extends: default

rules:
  line-length:
    max: 250
  truthy:
    check-keys: false
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  document-start: disable
  indentation:
    spaces: 2
    indent-sequences: whatever
  empty-lines:
    max: 3
  trailing-spaces: disable
  new-line-at-end-of-file: disable
