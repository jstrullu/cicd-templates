name: 'Build & Test Python'
description: 'Installation des dépendances, tests pytest avec couverture et analyse SonarQube optionnelle pour les projets Python'

inputs:
  python-version:
    description: 'Version de Python'
    required: false
    default: '3.12'
  requirements-file:
    description: 'Chemin du fichier requirements'
    required: false
    default: 'requirements.txt'
  test-directory:
    description: 'Répertoire de tests'
    required: false
    default: 'tests'
  project-version:
    description: 'Version du projet'
    required: true
  fichier-json:
    description: 'Fichier JSON de version'
    required: false
    default: 'cicd.json'
  sonar-key:
    description: 'Clé du projet SonarQube (vide = pas de Sonar)'
    required: false
    default: ''
  sonar-host-url:
    description: 'URL du serveur SonarQube'
    required: false
    default: ''
  sonar-token:
    description: 'Token SonarQube'
    required: false
    default: ''
  artifact-retention-days:
    description: 'Nombre de jours de rétention des artefacts'
    required: false
    default: '30'

runs:
  using: 'composite'
  steps:
    - name: Mise à jour du fichier de version
      uses: jstrullu/cicd/github-actions/actions/set-version-file@master
      with:
        fichier-json: ${{ inputs.fichier-json }}
        release-version: ${{ inputs.project-version }}

    - name: Installation de Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'

    - name: Installation des dépendances
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ inputs.requirements-file }}

    - name: Installation des dépendances de test
      shell: bash
      run: pip install pytest pytest-cov

    - name: Tests avec couverture
      shell: bash
      run: |
        python -m pytest ${{ inputs.test-directory }} \
          --junitxml=test-results.xml \
          --cov=. \
          --cov-report=xml:coverage.xml \
          --cov-report=html:coveragereport

    - name: Analyse SonarQube
      if: inputs.sonar-key != ''
      uses: SonarSource/sonarqube-scan-action@v3
      env:
        SONAR_TOKEN: ${{ inputs.sonar-token }}
        SONAR_HOST_URL: ${{ inputs.sonar-host-url }}
      with:
        args: >
          -Dsonar.projectKey=${{ inputs.sonar-key }}
          -Dsonar.sources=.
          -Dsonar.python.coverage.reportPaths=coverage.xml
          -Dsonar.python.xunit.reportPath=test-results.xml
          -Dsonar.projectVersion=${{ inputs.project-version }}

    - name: Upload de l'artefact
      uses: actions/upload-artifact@v4
      with:
        name: drop
        path: ${{ github.workspace }}
        retention-days: ${{ inputs.artifact-retention-days }}
