name: 'Angular Mutation Testing (Stryker)'
description: 'Tests de mutation avec Stryker pour les projets Angular'

inputs:
  node-version:
    description: 'Version de Node.js'
    required: false
    default: '20'
  artifact-retention-days:
    description: 'Nombre de jours de rétention des artefacts'
    required: false
    default: '30'

runs:
  using: 'composite'
  steps:
    - name: Installation de Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Installation des dépendances
      shell: bash
      run: |
        npm install -g @angular/cli
        npm install

    - name: Tests de mutation
      shell: bash
      run: npx stryker run

    - name: Upload du rapport de mutation
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mutation-report
        path: reports/mutation
        retention-days: ${{ inputs.artifact-retention-days }}
