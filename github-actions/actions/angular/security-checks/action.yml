name: 'Vérifications de sécurité Angular'
description: 'Analyse de sécurité Snyk et npm audit pour les projets Angular'

inputs:
  target-file:
    description: 'Fichier cible pour l''analyse Snyk (ex: package.json)'
    required: true
    default: 'package.json'
  snyk-token:
    description: 'Token d''authentification Snyk'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Installation de Snyk CLI
      shell: bash
      run: npm install -g snyk

    - name: Authentification Snyk
      shell: bash
      env:
        SNYK_TOKEN: ${{ inputs.snyk-token }}
      run: snyk auth "$SNYK_TOKEN"

    - name: Analyse de sécurité Snyk
      shell: bash
      env:
        SNYK_TOKEN: ${{ inputs.snyk-token }}
      run: |
        snyk test --file="${{ inputs.target-file }}" || true
        snyk monitor --file="${{ inputs.target-file }}" || true

    - name: npm audit
      shell: bash
      run: npm audit --omit=dev || true
