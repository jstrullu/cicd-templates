name: 'Finalisation'
description: 'Commit de version, tag git et push. Gère Angular/Node (npm version), .NET (AssemblyVersion dans .csproj), Python (pyproject.toml/setup.cfg/setup.py), Maven (pom.xml) et Java/Flutter/Go (cicd.json uniquement).'

inputs:
  release-version:
    description: 'Version à commiter'
    required: true
  fichier-json:
    description: 'Nom du fichier JSON de version'
    required: true
    default: 'cicd.json'
  language:
    description: 'Langage du projet (angular, node, .net, java, flutter, go, python, maven)'
    required: true
  project-file:
    description: 'Chemin du fichier .csproj (requis pour .net)'
    required: false
    default: ''
  git-user-email:
    description: 'Email pour les commits Git'
    required: false
    default: 'ci-service@example.com'
  git-user-name:
    description: 'Nom pour les commits Git'
    required: false
    default: 'CI Service'

runs:
  using: 'composite'
  steps:
    - name: Mise à jour du fichier de version
      uses: jstrullu/cicd/github-actions/actions/set-version-file@master
      with:
        fichier-json: ${{ inputs.fichier-json }}
        release-version: ${{ inputs.release-version }}

    - name: Installation de Node.js 20
      if: inputs.language == 'angular' || inputs.language == 'node'
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Mise à jour de la version Angular/Node
      if: inputs.language == 'angular' || inputs.language == 'node'
      shell: bash
      run: |
        npm ci
        npm version ${{ inputs.release-version }} --no-git-tag-version

    - name: Mise à jour de AssemblyVersion (.NET)
      if: inputs.language == '.net'
      shell: bash
      run: |
        if [ -n "${{ inputs.project-file }}" ]; then
          sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>${{ inputs.release-version }}</AssemblyVersion>|g" "${{ inputs.project-file }}"
        fi

    - name: Mise à jour de la version Python
      if: inputs.language == 'python'
      shell: bash
      run: |
        if [ -f pyproject.toml ]; then
          sed -i "s/^version = \".*\"/version = \"${{ inputs.release-version }}\"/" pyproject.toml
        elif [ -f setup.cfg ]; then
          sed -i "s/^version = .*/version = ${{ inputs.release-version }}/" setup.cfg
        elif [ -f setup.py ]; then
          sed -i "s/version=['\"].*['\"]/version='${{ inputs.release-version }}'/" setup.py
        fi

    - name: Mise à jour de la version Maven
      if: inputs.language == 'maven'
      shell: bash
      run: |
        mvn versions:set -B -ntp -DnewVersion=${{ inputs.release-version }} -DgenerateBackupPoms=false

    - name: Configuration Git
      shell: bash
      run: |
        git config --global user.email "${{ inputs.git-user-email }}"
        git config --global user.name "${{ inputs.git-user-name }}"

    - name: Commit de la version
      shell: bash
      run: |
        git add -A
        git commit -m "[skip ci] Set release version to ${{ inputs.release-version }}"

    - name: Tag de la version
      shell: bash
      run: |
        branch_name="${GITHUB_REF_NAME}"
        git tag -fa "${branch_name}-${{ inputs.release-version }}" -m "${{ inputs.release-version }}"

    - name: Push du commit et du tag
      shell: bash
      run: |
        git push origin HEAD --follow-tags
