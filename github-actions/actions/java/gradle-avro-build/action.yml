name: 'Java Gradle Avro Build'
description: 'Build Gradle pour les projets Avro (sans SonarQube)'

inputs:
  java-version:
    description: 'Version de Java'
    required: true
  project-version:
    description: 'Version du projet'
    required: true
  fichier-json:
    description: 'Nom du fichier JSON de version'
    required: true
    default: 'cicd.json'
  artifact-retention-days:
    description: 'Nombre de jours de rétention des artefacts'
    required: false
    default: '30'

runs:
  using: 'composite'
  steps:
    - name: Mise à jour du fichier de version
      uses: jstrullu/cicd/github-actions/actions/set-version-file@master
      with:
        fichier-json: ${{ inputs.fichier-json }}
        release-version: ${{ inputs.project-version }}

    - name: Installation de Java ${{ inputs.java-version }}
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ inputs.java-version }}
        cache: 'gradle'

    - name: Build Gradle
      shell: bash
      run: |
        chmod +x ./gradlew
        ./gradlew build

    - name: Upload de l'artefact
      uses: actions/upload-artifact@v4
      with:
        name: drop
        path: ${{ github.workspace }}
        retention-days: ${{ inputs.artifact-retention-days }}
