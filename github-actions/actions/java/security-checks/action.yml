name: 'Vérifications de sécurité Java'
description: 'Analyse de sécurité Snyk pour les projets Java (Gradle/Maven)'

inputs:
  target-file:
    description: 'Fichier cible pour l''analyse Snyk (ex: build.gradle, pom.xml)'
    required: true
  snyk-token:
    description: 'Token d''authentification Snyk'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Installation de Snyk CLI
      shell: bash
      run: npm install -g snyk

    - name: Authentification Snyk
      shell: bash
      env:
        SNYK_TOKEN: ${{ inputs.snyk-token }}
      run: snyk auth "$SNYK_TOKEN"

    - name: Analyse de sécurité Snyk
      shell: bash
      env:
        SNYK_TOKEN: ${{ inputs.snyk-token }}
      run: |
        snyk test --file="${{ inputs.target-file }}" || true
        snyk monitor --file="${{ inputs.target-file }}" || true
