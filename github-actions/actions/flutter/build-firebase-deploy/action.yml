name: 'Flutter Build & Firebase Deploy'
description: 'Build Flutter web avec analyse SonarQube et déploiement sur Firebase Hosting'

inputs:
  sonar-key:
    description: 'Clé du projet SonarQube'
    required: false
    default: ''
  environment:
    description: 'Environnement cible (dev, prod)'
    required: true
  firebase-token:
    description: 'Token/credentials Firebase (JSON du service account)'
    required: true
  sonar-host-url:
    description: 'URL du serveur SonarQube'
    required: false
    default: ''
  sonar-token:
    description: 'Token d''authentification SonarQube'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Installation de Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Installation de Cider
      shell: bash
      run: flutter pub global activate cider

    - name: Récupération de la version actuelle
      id: version
      shell: bash
      run: |
        export PATH="$PATH":"$HOME/.pub-cache/bin"
        cd src/
        VERSION_TAG=$(cider version)
        echo "release-version=$VERSION_TAG" >> "$GITHUB_OUTPUT"

    - name: Création du tag de version
      id: tag
      shell: bash
      run: |
        branch_name="${GITHUB_REF_NAME}"
        echo "image-tag=${branch_name}-${{ steps.version.outputs.release-version }}" >> "$GITHUB_OUTPUT"

    - name: Installation de Java 11
      if: inputs.sonar-key != ''
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: SonarQube Scan
      if: inputs.sonar-key != ''
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ inputs.sonar-token }}
        SONAR_HOST_URL: ${{ inputs.sonar-host-url }}
      with:
        args: >
          -Dsonar.projectKey=${{ inputs.sonar-key }}
          -Dsonar.projectName=${{ github.event.repository.name }}
          -Dsonar.projectVersion=${{ steps.tag.outputs.image-tag }}
          -Dsonar.exclusions=/coveragereport/**
          -Dsonar.flutter.coverage.reportPath=src/coverage/lcov.info
          -Dsonar.c.file.suffixes=-
          -Dsonar.cpp.file.suffixes=-
          -Dsonar.objc.file.suffixes=-

    - name: Installation de Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Configuration de l'environnement
      shell: bash
      run: |
        cd src/tools/
        node environment-generator ${{ inputs.environment }}

    - name: Build Flutter web
      shell: bash
      run: |
        cd src/
        flutter build web --no-tree-shake-icons

    - name: Déploiement Firebase
      shell: bash
      env:
        TOKEN: ${{ inputs.firebase-token }}
      run: |
        npm install -g firebase-tools
        echo "$TOKEN" > "$HOME/gcloud.json"
        export GOOGLE_APPLICATION_CREDENTIALS="$HOME/gcloud.json"
        cd src/
        firebase deploy --only hosting
