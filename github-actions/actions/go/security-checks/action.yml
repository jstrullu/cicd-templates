name: 'Vérifications de sécurité Go'
description: 'Analyse de sécurité Snyk et govulncheck pour les projets Go'

inputs:
  target-file:
    description: 'Fichier cible pour l''analyse Snyk (ex: go.mod)'
    required: true
    default: 'go.mod'
  snyk-token:
    description: 'Token d''authentification Snyk'
    required: true
  go-version:
    description: 'Version de Go'
    required: false
    default: '1.22'

runs:
  using: 'composite'
  steps:
    - name: Installation de Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}

    - name: Installation de Snyk CLI
      shell: bash
      run: npm install -g snyk

    - name: Authentification Snyk
      shell: bash
      env:
        SNYK_TOKEN: ${{ inputs.snyk-token }}
      run: snyk auth "$SNYK_TOKEN"

    - name: Analyse de sécurité Snyk
      shell: bash
      env:
        SNYK_TOKEN: ${{ inputs.snyk-token }}
      run: |
        snyk test --file="${{ inputs.target-file }}" || true
        snyk monitor --file="${{ inputs.target-file }}" || true

    - name: govulncheck
      shell: bash
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./... || true
