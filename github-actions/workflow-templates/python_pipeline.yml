# Pipeline Python — Copier dans .github/workflows/ du repo consommateur
# Variables à configurer dans la section env ci-dessous
name: Python Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  VERSION_INCREMENT: 'patch'
  FICHIER_JSON: 'cicd.json'
  SONAR_KEY: ''               # Clé du projet SonarQube
  PYTHON_VERSION: '3.12'
  REQUIREMENTS_FILE: 'requirements.txt'
  TEST_DIRECTORY: 'tests'
  DOCKER_REGISTRY: ''         # Adresse du registry Docker (ex: ghcr.io/org)
  KUBE_NAMESPACE: ''          # Namespace Kubernetes cible

jobs:
  initialisation:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versioning.outputs.version }}
      docker-tag: ${{ steps.versioning.outputs.docker-tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Versionnement sémantique
        id: versioning
        uses: jstrullu/cicd/github-actions/actions/semantic-version@master
        with:
          version-increment: ${{ env.VERSION_INCREMENT }}
          fichier-json: ${{ env.FICHIER_JSON }}

  build-and-test:
    runs-on: ubuntu-latest
    needs: initialisation
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test Python
        uses: jstrullu/cicd/github-actions/actions/python/build-test@master
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          requirements-file: ${{ env.REQUIREMENTS_FILE }}
          test-directory: ${{ env.TEST_DIRECTORY }}
          project-version: ${{ needs.initialisation.outputs.version }}
          fichier-json: ${{ env.FICHIER_JSON }}
          sonar-key: ${{ env.SONAR_KEY }}
          sonar-host-url: ${{ secrets.SONAR_HOST_URL }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}

  security-checks:
    runs-on: ubuntu-latest
    needs: initialisation
    if: ${{ vars.ENABLE_SECURITY_CHECKS == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Vérifications de sécurité
        uses: jstrullu/cicd/github-actions/actions/python/security-checks@master
        with:
          target-file: ${{ env.REQUIREMENTS_FILE }}
          snyk-token: ${{ secrets.SNYK_TOKEN }}
          python-version: ${{ env.PYTHON_VERSION }}

  docker-build-and-publish:
    runs-on: ubuntu-latest
    needs: [initialisation, build-and-test]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: drop
          path: ${{ github.workspace }}
      - name: Docker Build & Push
        uses: jstrullu/cicd/github-actions/actions/docker-build-push@master
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          image-name: ${{ github.event.repository.name }}
          tag: ${{ needs.initialisation.outputs.docker-tag }}
          registry-username: ${{ secrets.DOCKER_USERNAME }}
          registry-password: ${{ secrets.DOCKER_PASSWORD }}

  deploy-to-dev:
    runs-on: ubuntu-latest
    needs: [initialisation, build-and-test, docker-build-and-publish]
    if: github.event_name != 'pull_request'
    environment: Dev
    steps:
      - uses: actions/checkout@v4
      - name: Déploiement Kubernetes
        uses: jstrullu/cicd/github-actions/actions/kube-deploy@master
        env:
          BUILDID: ${{ needs.initialisation.outputs.docker-tag }}
        with:
          namespace: ${{ env.KUBE_NAMESPACE }}
          kubeconfig: ${{ secrets.KUBECONFIG }}

  finalisation:
    runs-on: ubuntu-latest
    needs: [initialisation, build-and-test, docker-build-and-publish]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Finalisation
        uses: jstrullu/cicd/github-actions/actions/finalisation@master
        with:
          release-version: ${{ needs.initialisation.outputs.version }}
          fichier-json: ${{ env.FICHIER_JSON }}
          language: 'python'
